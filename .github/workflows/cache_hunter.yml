name: Update Streak Image  

on:
  schedule:
    - cron: "*/5 * * * *"  
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update README with new timestamp
        run: |
          sed -i "s|https://github-streaks-87nn.onrender.com/streak/ryuzinoh/image?cache_bust=[0-9]*|https://github-streaks-87nn.onrender.com/streak/ryuzinoh/image?cache_bust=$(date +%s)|g" README.md

      - name: Commit and push changes if needed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git diff --quiet && exit 0  # Exit if no changes
          git add README.md
          git commit -m "Auto-update streak image [$(date)]"
          git pull --rebase  # Pull changes before pushing
          git push
