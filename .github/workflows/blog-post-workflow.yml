name: Latest blog post workflow
on:
  schedule: # Run workflow automatically
    - cron: "0 * * * *" # Runs every hour, on the hour
  workflow_dispatch: # Run workflow manually (without waiting for the cron to be called), through the GitHub Actions Workflow page directly
permissions:
  contents: write # To write the generated contents to the readme

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull in dev.to posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://safallama.com.np/feed.xml"

      - name: Update README.md with latest blog posts
        run: |
          # Fetch blog posts from the RSS feed and append to README.md
          echo "## Latest Blog Posts" >> README.md
          echo "Here are the latest blog posts:" >> README.md

          # Example of appending blog post links to README
          echo "- Blog Post 1: [URL](link)" >> README.md
          echo "- Blog Post 2: [URL](link)" >> README.md

      - name: Commit changes
        run: |
          git config --global user.name "Your Name"
          git config --global user.email "your-email@example.com"
          git add README.md
          git commit -m "Update README with latest blog posts"
          git push
