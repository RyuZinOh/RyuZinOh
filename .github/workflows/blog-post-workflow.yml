name: Latest blog post workflow
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull in dev.to posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://safallama.com.np/feed.xml"

      - name: Update Readme.md with latest blog posts
        run: |
          echo "## 📝 Latest Blog Posts" >> Readme.md
          echo "Here are the latest blog posts to check out:" >> Readme.md
          echo "" >> Readme.md
          echo "---" >> Readme.md
          echo "" >> Readme.md
          echo "<details>" >> Readme.md
          echo "<summary>Click to expand the latest posts</summary>" >> Readme.md
          echo "" >> Readme.md
          echo "- **Blog Post 1**: [URL](link)" >> Readme.md
          echo "- **Blog Post 2**: [URL](link)" >> Readme.md
          echo "- **Blog Post 3**: [URL](link)" >> Readme.md
          echo "" >> Readme.md
          echo "</details>" >> Readme.md
          echo "" >> Readme.md
          echo "---" >> Readme.md

      - name: Commit changes
        run: |
          git config --global user.name "Your Name"
          git config --global user.email "your-email@example.com"
          git add Readme.md
          git commit -m "Update Readme.md with latest blog posts"
          git push
