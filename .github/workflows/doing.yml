name: Update GitHub Streak Cache Bust

on:
  schedule:
    - cron: '0 */5 * * *'  # Every 5 hours
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Bump cache_bust in README
        run: |
          ts=$(date +%s)
          sed -i "s/cache_bust=[0-9]*/cache_bust=${ts}/" README.md

      - name: Commit and push
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git diff --quiet && echo "No changes" || (git add README.md && git commit -m "Update streak cache_bust" && git push)
